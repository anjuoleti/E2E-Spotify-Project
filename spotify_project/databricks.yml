# This is a Databricks asset bundle definition for spotify_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: spotify_project
  uuid: 53d0a44f-77cf-4645-85f3-4f6a3eb417c0

include:
  - resources/*.yml



# Variable declarations. These variables are assigned in the dev/prod targets below.


targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: http://adb-7405617912861800.0.azuredatabricks.net
    presets:
      name_prefix: dev_${workspace.current_user.short_name}
      source_linked_deployment: false

  prod:
    mode: production
    workspace:
      host: http://adb-7405617912861800.0.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/anjaniproject64@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/anjaniproject64@gmail.com/.bundle/${bundle.name}/${bundle.target}
    
    permissions:
      - user_name: anjaniproject64@gmail.com
        level: CAN_MANAGE
